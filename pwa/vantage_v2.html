<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | PRISM</title>
    <link rel="manifest" href="/pwa/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <link rel="stylesheet" href="/pwa/css/design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; }

        .main { flex:1; display:flex; flex-direction:column; min-height:100vh; }

        /* Top bar — matches dashboard */
        .top-bar { position:sticky; top:0; z-index:30; height:56px; background:rgba(10,10,15,0.85);
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--prism-border);
            display:flex; align-items:center; padding:0 var(--sp-6); gap:var(--sp-4); }
        .top-bar-title { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:var(--text-lg);
            color:var(--prism-text); }
        .top-bar-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px;
            border-radius:var(--radius-full); background:var(--prism-success-glow); border:1px solid rgba(16,185,129,0.2); }
        .top-bar-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--prism-success); animation:pulse 2s ease-in-out infinite; }
        .top-bar-badge span { font-size:10px; font-weight:700; color:var(--prism-success); text-transform:uppercase; letter-spacing:0.06em; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Content */
        .content { flex:1; overflow-y:auto; padding:var(--sp-6); }
        .content::-webkit-scrollbar { width:5px; }
        .content::-webkit-scrollbar-thumb { background:var(--prism-border); border-radius:99px; }

        /* Section header */
        .section-header { margin-bottom:var(--sp-5); }
        .section-title { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:var(--text-2xl);
            color:var(--prism-text); }
        .section-desc { font-size:var(--text-sm); color:var(--prism-text-muted); margin-top:var(--sp-1); }

        /* Divider */
        .section-divider { border:none; border-top:1px solid var(--prism-border); margin:var(--sp-10) 0; }

        /* Card grid — movers */
        .movers-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-4); }

        /* Mover card */
        .mover-card { background:var(--prism-surface); border:1px solid var(--prism-border); border-radius:var(--radius-lg);
            padding:var(--sp-4); cursor:pointer; transition:all 150ms ease; }
        .mover-card:hover { border-color:rgba(16,185,129,0.3); transform:translateY(-2px);
            box-shadow:0 8px 24px rgba(0,0,0,0.3); }
        .mover-top { display:flex; align-items:flex-start; gap:var(--sp-3); margin-bottom:var(--sp-3); }
        .mover-thumb { width:52px; height:52px; border-radius:var(--radius-md); object-fit:cover;
            background:var(--prism-surface-2); flex-shrink:0; }
        .mover-info { flex:1; min-width:0; }
        .growth-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:var(--radius-full);
            background:var(--prism-success-glow); font-size:10px; font-weight:700; color:var(--prism-success);
            margin-bottom:var(--sp-1); }
        .mover-name { font-weight:600; font-size:var(--text-sm); color:var(--prism-text); overflow:hidden;
            text-overflow:ellipsis; white-space:nowrap; }
        .mover-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--sp-2); margin-top:var(--sp-3); }
        .mover-stat { background:var(--prism-surface-2); padding:var(--sp-2); border-radius:var(--radius-md); text-align:center; }
        .mover-stat-label { font-size:9px; font-weight:700; color:var(--prism-text-faint); text-transform:uppercase;
            letter-spacing:0.04em; }
        .mover-stat-value { font-size:var(--text-xs); font-weight:700; color:var(--prism-text); margin-top:2px; }
        .mover-stat-value.green { color:var(--prism-success); }
        .mover-stat-value.cyan { color:var(--prism-cyan); }

        /* Video grid — shorts */
        .shorts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:var(--sp-5); }

        /* Video card */
        .video-card { background:var(--prism-surface); border:1px solid var(--prism-border); border-radius:var(--radius-lg);
            overflow:hidden; transition:all 200ms ease; display:flex; flex-direction:column; }
        .video-card:hover { border-color:rgba(124,58,237,0.3); transform:translateY(-4px);
            box-shadow:0 12px 32px rgba(0,0,0,0.4); }
        .video-cover { position:relative; aspect-ratio:9/16; background:var(--prism-surface-2); overflow:hidden; }
        .video-cover img { width:100%; height:100%; object-fit:cover; opacity:0.85; transition:opacity 200ms; }
        .video-card:hover .video-cover img { opacity:1; }
        .video-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            opacity:0; transition:opacity 200ms; }
        .video-card:hover .video-play { opacity:1; }
        .video-play a { width:56px; height:56px; border-radius:50%; background:var(--prism-accent);
            display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px;
            box-shadow:0 4px 20px rgba(124,58,237,0.4); transition:transform 150ms; }
        .video-play a:hover { transform:scale(1.1); }
        .video-duration { position:absolute; top:var(--sp-3); left:var(--sp-3); padding:4px 10px;
            border-radius:var(--radius-full); background:rgba(0,0,0,0.6); backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.08); font-size:10px; font-weight:700; color:var(--prism-text); }
        .video-overlay { position:absolute; bottom:var(--sp-3); left:var(--sp-3); right:var(--sp-3);
            background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.08);
            padding:var(--sp-3); border-radius:var(--radius-md); }
        .video-overlay-row { display:flex; justify-content:space-between; align-items:flex-end; }
        .video-overlay-label { font-size:9px; font-weight:700; color:var(--prism-text-muted); text-transform:uppercase;
            letter-spacing:0.06em; }
        .video-earnings { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:var(--text-xl);
            color:var(--prism-success); }
        .video-views { font-size:var(--text-sm); font-weight:600; color:var(--prism-text); }
        .video-body { padding:var(--sp-4); display:flex; flex-direction:column; flex:1; }
        .video-creator-row { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-3); }
        .video-product-thumb { width:36px; height:36px; border-radius:var(--radius-md); object-fit:cover;
            background:var(--prism-surface-2); flex-shrink:0; }
        .video-creator-name { font-size:10px; font-weight:700; color:var(--prism-accent-text); overflow:hidden;
            text-overflow:ellipsis; white-space:nowrap; }
        .video-product-name { font-size:var(--text-xs); font-weight:600; color:var(--prism-text-muted); overflow:hidden;
            text-overflow:ellipsis; white-space:nowrap; }
        .video-cta { display:flex; align-items:center; justify-content:center; gap:var(--sp-2);
            padding:var(--sp-2) var(--sp-3); border-radius:var(--radius-md); background:var(--prism-surface-2);
            border:1px solid var(--prism-border); font-size:10px; font-weight:700; color:var(--prism-text-muted);
            text-transform:uppercase; letter-spacing:0.06em; cursor:pointer; transition:all 120ms;
            text-decoration:none; margin-top:auto; }
        .video-cta:hover { border-color:var(--prism-accent); color:var(--prism-accent-text);
            background:var(--prism-accent-glow); }

        /* Filter pill */
        .filter-pill { display:inline-flex; align-items:center; gap:var(--sp-2); padding:var(--sp-2) var(--sp-4);
            border-radius:var(--radius-full); background:var(--prism-surface); border:1px solid var(--prism-border);
            font-size:10px; font-weight:700; color:var(--prism-accent-text); text-transform:uppercase;
            letter-spacing:0.06em; }

        /* Loading spinner */
        .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:var(--sp-16) 0; }
        .loading-state i { font-size:28px; color:var(--prism-accent); margin-bottom:var(--sp-4); }
        .loading-state p { font-size:10px; font-weight:700; color:var(--prism-text-faint); text-transform:uppercase;
            letter-spacing:0.1em; }

        /* Empty state */
        .empty-state { text-align:center; padding:var(--sp-16) 0; color:var(--prism-text-faint); }
        .empty-state i { font-size:40px; margin-bottom:var(--sp-4); opacity:0.3; }
        .empty-state p { font-size:var(--text-sm); }

        /* Skeleton */
        .skel { background:var(--prism-surface-2); border-radius:var(--radius-md); position:relative; overflow:hidden; }
        .skel::after { content:''; position:absolute; inset:0;
            background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.03) 50%,transparent 100%);
            background-size:200% 100%; animation:shimmer 1.8s ease-in-out infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* Responsive */
        @media (max-width: 1200px) {
            .movers-grid { grid-template-columns: repeat(2,1fr); }
        }
        @media (max-width: 767px) {
            .content { padding: var(--sp-4); }
            .movers-grid { grid-template-columns: 1fr; }
            .shorts-grid { grid-template-columns: 1fr 1fr; }
            .section-title { font-size: var(--text-xl); }
        }
        @media (max-width: 480px) {
            .shorts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div id="prism-nav"></div>

    <div class="main">
        <!-- Top bar -->
        <header class="top-bar">
            <button class="prism-nav-hamburger" onclick="prismNav.toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div style="flex:1; display:flex; align-items:center; gap:var(--sp-4)">
                <h2 class="top-bar-title">Analytics</h2>
                <div class="top-bar-badge">
                    <span class="dot"></span>
                    <span>Live Intel</span>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="content">

            <!-- Section 1: Movers & Shakers -->
            <div>
                <div class="section-header">
                    <h3 class="section-title">Movers & Shakers</h3>
                    <p class="section-desc">Products with explosive GMV growth in the last 7 days.</p>
                </div>

                <div id="moversGrid" class="movers-grid">
                    <div class="loading-state" style="grid-column:1/-1">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Scanning trends...</p>
                    </div>
                </div>
            </div>

            <hr class="section-divider">

            <!-- Section 2: ROI Shorts Feed -->
            <div id="shorts-feed">
                <div class="section-header" style="display:flex; align-items:flex-start; justify-content:space-between; gap:var(--sp-4); flex-wrap:wrap;">
                    <div>
                        <h3 class="section-title">ROI Shorts Goldmine</h3>
                        <p class="section-desc">High-earning videos under 15 seconds. Optimized for performance.</p>
                    </div>
                    <div class="filter-pill">
                        <i class="fas fa-filter" style="font-size:9px"></i>
                        &le; 15 Seconds
                    </div>
                </div>

                <div id="shortsGrid" class="shorts-grid">
                    <div class="loading-state" style="grid-column:1/-1">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Mining short-form data...</p>
                    </div>
                </div>
            </div>

        </div><!-- /.content -->
    </div><!-- /.main -->

    <!-- Creative Finder Modal -->
    <div id="creativeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
        backdrop-filter:blur(16px); z-index:100; align-items:center; justify-content:center; padding:var(--sp-6);">
        <div style="width:100%; max-width:900px; max-height:90vh; overflow-y:auto; background:var(--prism-surface);
            border:1px solid var(--prism-border); border-radius:var(--radius-xl); padding:var(--sp-8); position:relative;">
            <button onclick="closeCreativeModal()" style="position:absolute; top:var(--sp-4); right:var(--sp-4);
                background:none; border:none; color:var(--prism-text-muted); cursor:pointer; font-size:20px;">
                <i class="fas fa-times"></i>
            </button>
            <div id="creativeModalContent"></div>
        </div>
    </div>

    <!-- Shared nav -->
    <script src="/pwa/js/prism-nav.js"></script>

    <script>
        async function fetchMovers() {
            try {
                const res = await fetch('/api/analytics/movers-shakers?limit=8');
                const data = await res.json();
                if (data.success) renderMovers(data.products);
                else renderMovers([]);
            } catch (e) {
                console.error('Movers Error', e);
                renderMovers([]);
            }
        }

        async function fetchShorts() {
            try {
                const res = await fetch('/api/analytics/top-videos');
                const data = await res.json();
                if (data.success) renderShorts(data.videos);
                else renderShorts([]);
            } catch (e) {
                console.error('Shorts Error', e);
                renderShorts([]);
            }
        }

        function renderMovers(products) {
            const grid = document.getElementById('moversGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-chart-line"></i><p>No high-growth movers found.</p></div>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="mover-card" onclick="window.location.href='/product/${p.product_id}'">
                    <div class="mover-top">
                        <img src="/api/image-proxy/${p.product_id}" class="mover-thumb" loading="lazy"
                             onerror="this.style.display='none'" alt="">
                        <div class="mover-info">
                            <div class="growth-badge">
                                <i class="fas fa-arrow-up" style="font-size:8px"></i>
                                +${(p.gmv_growth || 0).toFixed(1)}%
                            </div>
                            <div class="mover-name">${p.product_name || 'Unknown Product'}</div>
                        </div>
                    </div>
                    <div class="mover-stats">
                        <div class="mover-stat">
                            <div class="mover-stat-label">7D Sales</div>
                            <div class="mover-stat-value">${(p.sales_7d || 0).toLocaleString()}</div>
                        </div>
                        <div class="mover-stat">
                            <div class="mover-stat-label">Ad Spend</div>
                            <div class="mover-stat-value green">$${(p.ad_spend || 0).toLocaleString()}</div>
                        </div>
                        <div class="mover-stat">
                            <div class="mover-stat-label">Videos</div>
                            <div class="mover-stat-value cyan">${(p.video_count || 0).toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderShorts(videos) {
            const grid = document.getElementById('shortsGrid');
            if (!videos || videos.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-play-circle"></i><p>No short-form top earners found.</p></div>';
                return;
            }
            grid.innerHTML = videos.map(v => `
                <div class="video-card">
                    <div class="video-cover">
                        <img src="${v.coverUrl}" loading="lazy" alt=""
                             onerror="this.style.display='none'">
                        <div class="video-play">
                            <a href="${v.videoUrl}" target="_blank" rel="noopener">
                                <i class="fas fa-play" style="margin-left:2px"></i>
                            </a>
                        </div>
                        <div class="video-duration">${v.durationSeconds}s</div>
                        <div class="video-overlay">
                            <div class="video-overlay-row">
                                <div>
                                    <div class="video-overlay-label">Earnings</div>
                                    <div class="video-earnings">$${(v.periodRevenue || 0).toLocaleString()}</div>
                                </div>
                                <div style="text-align:right">
                                    <div class="video-overlay-label">Views</div>
                                    <div class="video-views">${(v.periodViews || 0).toLocaleString()}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="video-body">
                        <div class="video-creator-row">
                            <img src="${v.productImageUrl}" class="video-product-thumb" loading="lazy"
                                 onerror="this.style.display='none'" alt="">
                            <div style="flex:1; min-width:0">
                                <div class="video-creator-name">@${v.creatorUsername}</div>
                                <div class="video-product-name">${v.productTitle}</div>
                            </div>
                        </div>
                        <a class="video-cta" href="/product/${v.productId}">
                            <i class="fas fa-arrow-right" style="font-size:9px"></i>
                            View Product Intel
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function closeCreativeModal() {
            document.getElementById('creativeModal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchMovers();
            fetchShorts();
        });
    </script>
</body>

</html>
