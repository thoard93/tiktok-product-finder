<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PRISM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/pwa/css/design-system.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--prism-bg);
            color: var(--prism-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Dark gradient background with violet mesh --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(124, 58, 237, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(124, 58, 237, 0.03) 0%, transparent 70%),
                linear-gradient(180deg, #07070d 0%, #0a0a14 50%, #0d0b18 100%);
        }

        /* --- Floating stat numbers --- */
        .floating-stat {
            position: fixed;
            color: var(--prism-text-muted);
            font-family: 'Courier New', Courier, monospace;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            10% {
                opacity: var(--float-opacity, 0.07);
            }
            90% {
                opacity: var(--float-opacity, 0.07);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--drift, 20px));
            }
        }

        .floating-stat:nth-child(1)  { left: 5%;  top: 90%; font-size: 14px; --float-opacity: 0.07; --drift: 30px;  animation-duration: 22s; animation-delay: 0s; }
        .floating-stat:nth-child(2)  { left: 15%; top: 85%; font-size: 12px; --float-opacity: 0.06; --drift: -20px; animation-duration: 28s; animation-delay: 3s; }
        .floating-stat:nth-child(3)  { left: 30%; top: 95%; font-size: 18px; --float-opacity: 0.08; --drift: 15px;  animation-duration: 25s; animation-delay: 7s; }
        .floating-stat:nth-child(4)  { left: 50%; top: 88%; font-size: 13px; --float-opacity: 0.06; --drift: -25px; animation-duration: 30s; animation-delay: 2s; }
        .floating-stat:nth-child(5)  { left: 65%; top: 92%; font-size: 16px; --float-opacity: 0.09; --drift: 18px;  animation-duration: 24s; animation-delay: 5s; }
        .floating-stat:nth-child(6)  { left: 80%; top: 87%; font-size: 12px; --float-opacity: 0.07; --drift: -15px; animation-duration: 26s; animation-delay: 10s; }
        .floating-stat:nth-child(7)  { left: 92%; top: 93%; font-size: 15px; --float-opacity: 0.06; --drift: 22px;  animation-duration: 32s; animation-delay: 1s; }
        .floating-stat:nth-child(8)  { left: 42%; top: 96%; font-size: 20px; --float-opacity: 0.08; --drift: -30px; animation-duration: 27s; animation-delay: 8s; }
        .floating-stat:nth-child(9)  { left: 10%; top: 80%; font-size: 14px; --float-opacity: 0.07; --drift: 12px;  animation-duration: 29s; animation-delay: 4s; }
        .floating-stat:nth-child(10) { left: 75%; top: 82%; font-size: 17px; --float-opacity: 0.10; --drift: -18px; animation-duration: 23s; animation-delay: 6s; }

        /* --- Login card --- */
        .login-card {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 100%;
            margin: 16px;
            padding: 48px 40px;
            background: var(--prism-surface);
            border: 1px solid var(--prism-border);
            border-radius: 16px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(124, 58, 237, 0.04);
            text-align: center;
        }

        /* --- Logo --- */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }

        .logo-text {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: 0.08em;
            color: var(--prism-text);
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--prism-text-muted);
            margin-bottom: 40px;
        }

        /* --- Discord button --- */
        .btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            background: #7c3aed;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-discord:hover {
            background: #8b5cf6;
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.3);
        }

        .btn-discord:active {
            background: #7c3aed;
        }

        .btn-discord svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* --- Small print --- */
        .small-print {
            margin-top: 24px;
            font-size: 12px;
            color: var(--prism-text-muted);
        }

        /* --- Error banner --- */
        .error-banner {
            padding: 12px 16px;
            margin-bottom: 24px;
            border-radius: 10px;
            background: var(--prism-error-glow);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--prism-error);
            font-size: 13px;
            font-weight: 500;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                margin: 12px;
            }

            .logo-text {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <!-- Floating background stats -->
    <span class="floating-stat">7D Sales: 2.4K</span>
    <span class="floating-stat">GMV: $12.8K</span>
    <span class="floating-stat">Commission: 15%</span>
    <span class="floating-stat">Videos: 847</span>
    <span class="floating-stat">Creators: 52</span>
    <span class="floating-stat">Rating: 4.8&#9733;</span>
    <span class="floating-stat">Units Sold: 3.1K</span>
    <span class="floating-stat">Avg Price: $24.99</span>
    <span class="floating-stat">CTR: 6.2%</span>
    <span class="floating-stat">Revenue: $41.5K</span>

    <div class="login-card">
        <div class="logo-container">
            <!-- Prism SVG icon -->
            <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="prism-grad" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#a78bfa"/>
                        <stop offset="50%" stop-color="#7c3aed"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <!-- Triangular prism shape -->
                <path d="M24 4L6 40h36L24 4z" stroke="url(#prism-grad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
                <!-- Light refraction lines inside -->
                <path d="M24 4L16 40" stroke="url(#prism-grad)" stroke-width="1.2" opacity="0.5"/>
                <path d="M24 4L32 40" stroke="url(#prism-grad)" stroke-width="1.2" opacity="0.5"/>
                <!-- Dispersed light rays coming out right side -->
                <line x1="32" y1="28" x2="44" y2="22" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
                <line x1="33" y1="31" x2="44" y2="30" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
                <line x1="34" y1="34" x2="44" y2="38" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
            </svg>
            <span class="logo-text">PRISM</span>
        </div>

        <p class="tagline">TikTok Shop Intelligence, Elevated.</p>

        <div id="error-container"></div>

        <a href="/auth/discord" class="btn-discord">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Login with Discord
        </a>

        <p class="small-print">Access restricted to authorized users.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorMessages = {
                'no_code': 'Login was cancelled or failed. Please try again.',
                'token_failed': 'Failed to authenticate with Discord. Please try again.',
                'user_failed': 'Failed to get your Discord profile. Please try again.',
                'not_in_server': 'Access restricted to approved Discord server members.',
                'oauth_error': 'An authentication error occurred. Please retry.'
            };
            const container = document.getElementById('error-container');
            container.innerHTML = '<div class="error-banner">' + (errorMessages[error] || 'An unexpected error occurred.') + '</div>';
        }
    </script>
</body>

</html>
