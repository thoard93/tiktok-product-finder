<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Brand Hunter</title>
    <link rel="stylesheet" href="/pwa/css/design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ── Layout ── */
        body { display: flex; min-height: 100vh; }

        /* ── Main area ── */
        .main { flex:1; display:flex; flex-direction:column; min-height:100vh; }

        /* ── Top bar ── */
        .top-bar { position:sticky; top:0; z-index:30; height:56px; background:rgba(10,10,15,0.85);
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--prism-border);
            display:flex; align-items:center; padding:0 var(--sp-6); gap:var(--sp-4); }
        .prism-nav-hamburger { /* styled by prism-nav.js */ }

        /* ── Content ── */
        .content { flex:1; overflow-y:auto; padding:var(--sp-6); max-width:var(--max-content); width:100%; }

        /* ── Page header ── */
        .page-header { margin-bottom:var(--sp-8); }
        .page-title { font-family:'Cabinet Grotesk',sans-serif; font-size:var(--text-3xl); font-weight:700;
            letter-spacing:-0.02em; color:var(--prism-text); margin-bottom:var(--sp-1); }
        .page-subtitle { font-size:var(--text-base); color:var(--prism-text-muted); }

        /* ── Search bar ── */
        .search-bar { display:flex; gap:var(--sp-3); margin-bottom:var(--sp-6); }
        .search-input { flex:1; background:var(--prism-surface); border:1px solid var(--prism-border);
            border-radius:var(--radius-md); padding:var(--sp-3) var(--sp-4); font-size:var(--text-base);
            color:var(--prism-text); outline:none; transition:border-color 120ms; font-family:'Inter',sans-serif; }
        .search-input:focus { border-color:var(--prism-accent); box-shadow:0 0 0 3px var(--prism-accent-glow); }
        .search-input::placeholder { color:var(--prism-text-faint); }

        .btn { display:inline-flex; align-items:center; gap:var(--sp-2); padding:var(--sp-2) var(--sp-5);
            border-radius:var(--radius-md); font-size:var(--text-sm); font-weight:600; cursor:pointer;
            border:none; transition:all 120ms ease; font-family:'Inter',sans-serif; }
        .btn-primary { background:var(--prism-accent); color:#fff; }
        .btn-primary:hover { background:var(--prism-accent-hover); box-shadow:var(--shadow-glow-accent); }
        .btn-primary:disabled { opacity:0.5; cursor:default; }
        .btn-sm { padding:var(--sp-1) var(--sp-3); font-size:var(--text-xs); }
        .btn-track { background:var(--prism-accent-glow); color:var(--prism-accent-text); border:1px solid rgba(124,58,237,0.3); }
        .btn-track:hover { background:var(--prism-accent); color:#fff; }
        .btn-danger { background:transparent; color:var(--prism-error); border:1px solid rgba(244,63,94,0.2); }
        .btn-danger:hover { background:var(--prism-error-glow); border-color:rgba(244,63,94,0.4); }
        .btn-ghost { background:transparent; color:var(--prism-text-muted); border:1px solid var(--prism-border); }
        .btn-ghost:hover { background:var(--prism-surface-2); color:var(--prism-text); }

        /* ── Search results ── */
        .search-results { margin-bottom:var(--sp-8); }
        .search-results-title { font-size:var(--text-sm); font-weight:600; color:var(--prism-text-muted);
            text-transform:uppercase; letter-spacing:0.06em; margin-bottom:var(--sp-3); }
        .search-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:var(--sp-3); }
        .search-card { background:var(--prism-surface); border:1px solid var(--prism-border); border-radius:var(--radius-lg);
            padding:var(--sp-4); display:flex; align-items:center; justify-content:space-between; gap:var(--sp-3);
            transition:border-color var(--duration-fast) ease; }
        .search-card:hover { border-color:var(--prism-border-strong); }
        .search-card-info { min-width:0; }
        .search-card-name { font-weight:600; color:var(--prism-text); font-size:var(--text-base);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .search-card-meta { font-size:var(--text-xs); color:var(--prism-text-muted); margin-top:2px; }

        /* ── Section heading ── */
        .section-heading { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-4); }
        .section-title { font-family:'Cabinet Grotesk',sans-serif; font-size:var(--text-xl); font-weight:700;
            color:var(--prism-text); }
        .section-count { font-size:var(--text-sm); color:var(--prism-text-muted); }

        /* ── Brand card ── */
        .brand-cards { display:flex; flex-direction:column; gap:var(--sp-3); }
        .brand-card { background:var(--prism-surface); border:1px solid var(--prism-border); border-radius:var(--radius-lg);
            overflow:hidden; transition:border-color var(--duration-fast) ease; }
        .brand-card:hover { border-color:var(--prism-border-strong); }
        .brand-card-header { display:flex; align-items:center; gap:var(--sp-4); padding:var(--sp-4) var(--sp-5);
            cursor:pointer; user-select:none; }
        .brand-card-header:hover { background:var(--prism-surface-2); }
        .brand-name { font-family:'Cabinet Grotesk',sans-serif; font-size:var(--text-lg); font-weight:700;
            color:var(--prism-text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .brand-stats { display:flex; gap:var(--sp-6); align-items:center; flex-shrink:0; }
        .brand-stat { text-align:center; }
        .brand-stat-value { font-size:var(--text-base); font-weight:700; color:var(--prism-text); }
        .brand-stat-label { font-size:10px; color:var(--prism-text-faint); text-transform:uppercase; letter-spacing:0.06em; }
        .brand-chevron { color:var(--prism-text-faint); transition:transform var(--duration-base) var(--ease-out);
            font-size:var(--text-sm); flex-shrink:0; width:20px; text-align:center; }
        .brand-chevron.expanded { transform:rotate(180deg); }
        .brand-actions { flex-shrink:0; display:flex; gap:var(--sp-2); }

        /* ── Brand products (expanded) ── */
        .brand-products { display:none; border-top:1px solid var(--prism-border); }
        .brand-products.open { display:block; }
        .brand-products-inner { padding:var(--sp-3) var(--sp-5) var(--sp-4); }
        .product-row { display:grid; grid-template-columns:40px 1fr 80px 80px 80px; gap:var(--sp-3);
            align-items:center; padding:var(--sp-2) var(--sp-2); border-radius:var(--radius-sm);
            font-size:var(--text-sm); }
        .product-row:nth-child(odd) { background:var(--prism-surface-2); }
        .product-row:nth-child(even) { background:transparent; }
        .product-row-header { font-size:10px; font-weight:700; color:var(--prism-text-faint);
            text-transform:uppercase; letter-spacing:0.06em; background:transparent !important; border-bottom:1px solid var(--prism-border);
            padding-bottom:var(--sp-2); margin-bottom:var(--sp-1); }
        .product-thumb { width:40px; height:40px; border-radius:var(--radius-sm); object-fit:cover;
            background:var(--prism-surface-2); }
        .product-name-cell { font-weight:500; color:var(--prism-text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .product-num { text-align:right; color:var(--prism-text-muted); font-variant-numeric:tabular-nums; }

        /* ── Empty state ── */
        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:var(--sp-16) var(--sp-6); color:var(--prism-text-faint); text-align:center; }
        .empty-icon { font-size:48px; margin-bottom:var(--sp-4); opacity:0.3; animation:emptyFloat 3s ease-in-out infinite; }
        @keyframes emptyFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .empty-text { font-size:var(--text-base); max-width:320px; }

        /* ── Spinner ── */
        .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--prism-border);
            border-top-color:var(--prism-accent); border-radius:50%; animation:spin 0.6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .spinner-lg { width:32px; height:32px; border-width:3px; }
        .loading-center { display:flex; align-items:center; justify-content:center; padding:var(--sp-12); }

        /* ── Toast ── */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:var(--sp-2) var(--sp-5);
            border-radius:var(--radius-lg); font-size:var(--text-sm); font-weight:600; z-index:200;
            backdrop-filter:blur(12px); animation:toastIn 0.3s ease; pointer-events:none; }
        .toast-info { background:rgba(6,182,212,0.15); border:1px solid rgba(6,182,212,0.3); color:var(--prism-cyan); }
        .toast-error { background:rgba(244,63,94,0.15); border:1px solid rgba(244,63,94,0.3); color:var(--prism-error); }
        .toast-success { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:var(--prism-success); }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

        /* ── Responsive ── */
        @media (max-width: 767px) {
            .main { margin-left:0; }
            .content { padding:var(--sp-4); }
            .brand-stats { display:none; }
            .product-row { grid-template-columns:40px 1fr 70px; }
            .product-row .hide-mobile { display:none; }
            .search-grid { grid-template-columns:1fr; }
            .page-title { font-size:var(--text-2xl); }
        }
        @media (max-width: 480px) {
            .search-bar { flex-direction:column; }
            .search-bar .btn { width:100%; justify-content:center; }
        }
    </style>
</head>

<body>
    <div id="prism-nav"></div>

    <!-- Main Content -->
    <div class="main">
        <!-- Top Bar -->
        <header class="top-bar">
            <button class="prism-nav-hamburger" onclick="prismNav.toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div style="font-size:var(--text-sm);font-weight:600;color:var(--prism-text)">
                <i class="fas fa-crosshairs" style="color:var(--prism-accent-text);margin-right:var(--sp-2)"></i>
                Brand Hunter
            </div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:var(--sp-3)">
                <button class="btn btn-ghost btn-sm" onclick="refreshAllBrands()" id="btnRefreshAll" title="Refresh all brand stats">
                    <i class="fas fa-arrows-rotate" style="font-size:11px"></i>
                    <span class="hide-mobile">Refresh All</span>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Brand Hunter</h1>
                <p class="page-subtitle">Track and analyze TikTok Shop brands</p>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput"
                       placeholder="Search brands by name..."
                       onkeydown="if(event.key==='Enter')searchBrands()">
                <button class="btn btn-primary" onclick="searchBrands()" id="btnSearch">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <!-- Search Results (hidden by default) -->
            <div class="search-results" id="searchResults" style="display:none">
                <div class="search-results-title" id="searchResultsTitle">Search Results</div>
                <div class="search-grid" id="searchGrid"></div>
            </div>

            <!-- Watched Brands Section -->
            <div class="section-heading">
                <div>
                    <span class="section-title">Watched Brands</span>
                    <span class="section-count" id="brandCount"></span>
                </div>
            </div>

            <div id="brandList" class="brand-cards"></div>
            <div id="brandLoading" class="loading-center">
                <div class="spinner spinner-lg"></div>
            </div>
            <div id="brandEmpty" class="empty-state" style="display:none">
                <div class="empty-icon"><i class="fas fa-crosshairs"></i></div>
                <div class="empty-text">Start tracking brands to monitor their performance</div>
            </div>
        </div>
    </div>

    <script>
    /* ================================================================
       Brand Hunter — PRISM
       ================================================================ */

    // ── State ──
    let watchedBrands = [];
    const expandedCache = {}; // brandId -> products[]

    // ── Formatting helpers ──
    function fmt(n) {
        if (n == null || isNaN(n)) return '0';
        return Number(n).toLocaleString('en-US');
    }

    function fmtK(n) {
        if (n == null || isNaN(n)) return '0';
        n = Number(n);
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
        return n.toLocaleString('en-US');
    }

    function fmtDollar(n) {
        if (n == null || isNaN(n)) return '$0';
        return '$' + fmtK(n);
    }

    // ── Toast notification ──
    function toast(msg, type = 'info') {
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // ── Search Brands ──
    async function searchBrands() {
        const q = document.getElementById('searchInput').value.trim();
        if (!q) return;

        const btn = document.getElementById('btnSearch');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Searching...';

        try {
            const res = await fetch(`/api/brands/discover`);
            if (!res.ok) throw new Error('Search failed');
            const data = await res.json();

            const results = (data.discovered || []).filter(b =>
                b.seller_name && b.seller_name.toLowerCase().includes(q.toLowerCase())
            );

            renderSearchResults(results, q);
        } catch (err) {
            toast('Failed to search brands', 'error');
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search"></i> Search';
        }
    }

    function renderSearchResults(results, query) {
        const container = document.getElementById('searchResults');
        const grid = document.getElementById('searchGrid');
        const title = document.getElementById('searchResultsTitle');

        if (results.length === 0) {
            title.textContent = `No brands found for "${query}"`;
            grid.innerHTML = '';
            container.style.display = 'block';
            return;
        }

        title.textContent = `Found ${results.length} brand${results.length !== 1 ? 's' : ''} matching "${query}"`;
        grid.innerHTML = results.map(b => {
            const tracked = watchedBrands.some(wb => wb.name && wb.name.toLowerCase() === (b.seller_name || '').toLowerCase());
            return `
            <div class="search-card">
                <div class="search-card-info">
                    <div class="search-card-name">${esc(b.seller_name)}</div>
                    <div class="search-card-meta">${fmt(b.product_count)} products &middot; ${fmtDollar(b.total_gmv)} GMV &middot; ${fmtK(b.total_sales_7d)} 7D sales</div>
                </div>
                ${tracked
                    ? '<span style="font-size:var(--text-xs);color:var(--prism-success);font-weight:600"><i class="fas fa-check"></i> Tracked</span>'
                    : `<button class="btn btn-track btn-sm" onclick="trackBrand('${esc(b.seller_name)}', this)"><i class="fas fa-plus"></i> Track</button>`
                }
            </div>`;
        }).join('');

        container.style.display = 'block';
    }

    // ── Track Brand ──
    async function trackBrand(name, btnEl) {
        if (btnEl) {
            btnEl.disabled = true;
            btnEl.innerHTML = '<div class="spinner"></div>';
        }
        try {
            const res = await fetch('/api/brands', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to track brand');

            toast(`Now tracking "${name}"`, 'success');
            if (btnEl) {
                btnEl.outerHTML = '<span style="font-size:var(--text-xs);color:var(--prism-success);font-weight:600"><i class="fas fa-check"></i> Tracked</span>';
            }
            await loadWatchedBrands();
        } catch (err) {
            toast(err.message, 'error');
            if (btnEl) {
                btnEl.disabled = false;
                btnEl.innerHTML = '<i class="fas fa-plus"></i> Track';
            }
        }
    }

    // ── Remove Brand ──
    async function removeBrand(brandId, name) {
        if (!confirm(`Stop tracking "${name}"?`)) return;

        try {
            const res = await fetch(`/api/brands/${brandId}`, { method: 'DELETE' });
            if (!res.ok) throw new Error('Failed to remove brand');

            toast(`Removed "${name}"`, 'info');
            delete expandedCache[brandId];
            await loadWatchedBrands();
        } catch (err) {
            toast(err.message, 'error');
        }
    }

    // ── Load Watched Brands ──
    async function loadWatchedBrands() {
        const list = document.getElementById('brandList');
        const loading = document.getElementById('brandLoading');
        const empty = document.getElementById('brandEmpty');
        const count = document.getElementById('brandCount');

        loading.style.display = 'flex';
        empty.style.display = 'none';
        list.innerHTML = '';

        try {
            const res = await fetch('/api/brands');
            if (!res.ok) throw new Error('Failed to load brands');
            const data = await res.json();

            watchedBrands = data.brands || [];

            if (watchedBrands.length === 0) {
                empty.style.display = 'flex';
                count.textContent = '';
            } else {
                count.textContent = `(${watchedBrands.length})`;
                list.innerHTML = watchedBrands.map(b => renderBrandCard(b)).join('');
            }
        } catch (err) {
            toast('Failed to load watched brands', 'error');
            console.error(err);
            empty.style.display = 'flex';
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderBrandCard(b) {
        const topProduct = b.top_product_name || b.top_product || '-';
        return `
        <div class="brand-card" id="brand-${b.id}">
            <div class="brand-card-header" onclick="toggleBrandExpand(${b.id}, '${esc(b.name)}')">
                <div class="brand-name">${esc(b.name)}</div>
                <div class="brand-stats">
                    <div class="brand-stat">
                        <div class="brand-stat-value">${fmt(b.product_count || 0)}</div>
                        <div class="brand-stat-label">Products</div>
                    </div>
                    <div class="brand-stat">
                        <div class="brand-stat-value">${fmtDollar(b.total_gmv || b.gmv || 0)}</div>
                        <div class="brand-stat-label">GMV</div>
                    </div>
                    <div class="brand-stat">
                        <div class="brand-stat-value">${fmtK(b.total_sales_7d || 0)}</div>
                        <div class="brand-stat-label">7D Sales</div>
                    </div>
                </div>
                <div class="brand-actions" onclick="event.stopPropagation()">
                    <button class="btn btn-ghost btn-sm" onclick="syncBrand(${b.id})" title="Refresh stats">
                        <i class="fas fa-arrows-rotate" style="font-size:11px"></i>
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="removeBrand(${b.id}, '${esc(b.name)}')" title="Stop tracking">
                        <i class="fas fa-trash-can" style="font-size:11px"></i>
                    </button>
                </div>
                <i class="fas fa-chevron-down brand-chevron" id="chevron-${b.id}"></i>
            </div>
            <div class="brand-products" id="products-${b.id}">
                <div class="brand-products-inner" id="products-inner-${b.id}">
                    <div class="loading-center"><div class="spinner"></div></div>
                </div>
            </div>
        </div>`;
    }

    // ── Toggle expand/collapse ──
    async function toggleBrandExpand(brandId, brandName) {
        const productsEl = document.getElementById(`products-${brandId}`);
        const chevron = document.getElementById(`chevron-${brandId}`);
        const inner = document.getElementById(`products-inner-${brandId}`);

        if (productsEl.classList.contains('open')) {
            productsEl.classList.remove('open');
            chevron.classList.remove('expanded');
            return;
        }

        productsEl.classList.add('open');
        chevron.classList.add('expanded');

        // Lazy-load products on first expand
        if (!expandedCache[brandId]) {
            inner.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
            try {
                const res = await fetch(`/api/brands/${brandId}/products`);
                if (!res.ok) throw new Error('Failed to load products');
                const data = await res.json();
                expandedCache[brandId] = data.products || [];
            } catch (err) {
                inner.innerHTML = '<div style="padding:var(--sp-4);color:var(--prism-error);font-size:var(--text-sm)">Failed to load products</div>';
                console.error(err);
                return;
            }
        }

        renderBrandProducts(brandId, inner);
    }

    function renderBrandProducts(brandId, container) {
        const products = expandedCache[brandId] || [];

        if (products.length === 0) {
            container.innerHTML = '<div style="padding:var(--sp-4);color:var(--prism-text-faint);font-size:var(--text-sm);text-align:center">No products found for this brand</div>';
            return;
        }

        let html = `
        <div class="product-row product-row-header">
            <div></div>
            <div>Product</div>
            <div class="product-num">Price</div>
            <div class="product-num hide-mobile">7D Sales</div>
            <div class="product-num hide-mobile">Commission</div>
        </div>`;

        html += products.map(p => {
            const img = p.image_url || p.images?.[0] || '';
            const commission = p.commission_rate ? (p.commission_rate + '%') : '-';
            return `
            <div class="product-row">
                <img class="product-thumb" src="${esc(img)}" alt="" onerror="this.style.display='none'" loading="lazy">
                <div class="product-name-cell" title="${esc(p.title || p.name || '')}">${esc(p.title || p.name || 'Untitled')}</div>
                <div class="product-num">$${fmt(p.price || 0)}</div>
                <div class="product-num hide-mobile">${fmtK(p.sales_7d || p.units_sold_7d || 0)}</div>
                <div class="product-num hide-mobile">${commission}</div>
            </div>`;
        }).join('');

        container.innerHTML = html;
    }

    // ── Sync single brand ──
    async function syncBrand(brandId) {
        try {
            const res = await fetch(`/api/brands/${brandId}/sync`, { method: 'POST' });
            if (!res.ok) throw new Error('Sync failed');
            const data = await res.json();
            toast(data.message || 'Brand synced', 'success');
            delete expandedCache[brandId];
            await loadWatchedBrands();
        } catch (err) {
            toast(err.message, 'error');
        }
    }

    // ── Refresh all brands ──
    async function refreshAllBrands() {
        const btn = document.getElementById('btnRefreshAll');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> <span class="hide-mobile">Refreshing...</span>';

        try {
            const res = await fetch('/api/brands/refresh-all', { method: 'POST' });
            if (!res.ok) throw new Error('Refresh failed');
            const data = await res.json();
            toast(data.message || 'All brands refreshed', 'success');
            Object.keys(expandedCache).forEach(k => delete expandedCache[k]);
            await loadWatchedBrands();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-arrows-rotate" style="font-size:11px"></i> <span class="hide-mobile">Refresh All</span>';
        }
    }

    // ── Escape HTML ──
    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
        loadWatchedBrands();
    });
    </script>
    <script src="/pwa/js/prism-nav.js"></script>
</body>
</html>
