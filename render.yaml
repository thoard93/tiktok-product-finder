services:
  # Main Web Service (Gem Hunter)
  - type: web
    name: gem-hunter
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install-deps && python -m playwright install chromium
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 --worker-class=sync
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-db
          property: connectionString

  # EchoTik Sync Cron (trending products every 6 hours)
  - type: cron
    name: echotik-sync
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app.services.scheduler import echotik_trending_sync; from app import app; echotik_trending_sync(app)"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-db
          property: connectionString

databases:
  - name: tiktok-db
    plan: free
