<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f9f0f1">
  <title>Offline — Vantage</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9f0f1;color:#1a1a1a;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{max-width:420px;width:100%;text-align:center}
    h1{font-size:24px;font-weight:800;margin-bottom:8px}
    p{font-size:15px;color:#555;line-height:1.6;margin-bottom:24px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#ff5272;color:#fff;font-weight:600;padding:14px 28px;border-radius:12px;border:none;font-size:15px;text-decoration:none;cursor:pointer;min-height:44px;-webkit-tap-highlight-color:transparent}
    .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff5272;margin-right:8px;vertical-align:middle}
  </style>
</head>
<body>
  <main class="wrap">
    <h1><span class="dot"></span>You're offline</h1>
    <p>Cached pages still work — try Products or Dashboard. We'll reconnect as soon as your network is back.</p>
    <a href="/app/dashboard" class="btn">Open Dashboard</a>
  </main>
</body>
</html>
