<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vantage{% endblock %} | TikTok Shop Intelligence</title>
  <meta name="description" content="{% block meta_desc %}Real-time TikTok Shop product intelligence. Find winning products before they go viral.{% endblock %}">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="public-body">

  <nav class="public-nav">
    <a href="/" class="public-nav-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><path d="M6 22L14 4L22 22" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 4V14" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round"/><path d="M14 14L20 8" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="8" r="2" fill="#2dd4bf"/></svg>
      <span class="sidebar-wordmark" style="font-size:var(--text-lg)">Vantage</span>
    </a>
    <div class="public-nav-right">
      <a href="/#features">Features</a>
      <a href="/#pricing">Pricing</a>
      <a href="/login" class="btn btn-ghost btn-sm">Sign in</a>
      <a href="/register" class="btn btn-primary btn-sm">Start free</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="public-footer">
    <div class="public-nav-logo" style="opacity:.4">
      <svg width="18" height="18" viewBox="0 0 28 28" fill="none"><path d="M6 22L14 4L22 22" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 4V14" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round"/><path d="M14 14L20 8" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="8" r="2" fill="#2dd4bf"/></svg>
      <span style="font-size:var(--text-sm);color:var(--text-faint)">Vantage</span>
    </div>
    <div class="public-footer-links">
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="#">Discord</a>
    </div>
  </footer>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
  <script>lucide.createIcons();</script>
</body>
</html>
