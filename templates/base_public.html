<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vantage{% endblock %} | TikTok Shop Intelligence</title>
  <meta name="description" content="{% block meta_desc %}Real-time TikTok Shop product intelligence. Find winning products before they go viral.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Vantage — TikTok Shop Product Intelligence{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Real-time TikTok Shop product data for affiliate marketers. Find trending products, track commissions, and discover opportunities.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}https://vantagehq.shop/static/img/og-preview.png{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vantagehq.shop{{ request.path if request else '/' }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vantage — TikTok Shop Intelligence">
  <meta name="twitter:description" content="Find winning TikTok Shop products with real sales data and commission rates.">
  <link rel="canonical" href="https://vantagehq.shop{{ request.path if request else '/' }}">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="public-body">

  <nav class="public-nav">
    <a href="/" class="public-nav-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><path d="M6 22L14 4L22 22" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 4V14" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round"/><path d="M14 14L20 8" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="8" r="2" fill="#2dd4bf"/></svg>
      <span class="sidebar-wordmark" style="font-size:var(--text-lg)">Vantage</span>
    </a>
    <div class="public-nav-right">
      <a href="/#features">Features</a>
      <a href="/#pricing">Pricing</a>
      <a href="/login" class="btn btn-ghost btn-sm" style="color:#e8e6e1;border-color:rgba(255,255,255,0.2)">Sign in</a>
      <a href="/register" style="display:inline-flex;align-items:center;padding:8px 18px;background:#ff5272;color:#fff;font-weight:600;font-size:14px;border-radius:8px;text-decoration:none;transition:background 150ms">Start free</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="public-footer">
    <div class="public-nav-logo" style="opacity:.6">
      <svg width="18" height="18" viewBox="0 0 28 28" fill="none"><path d="M6 22L14 4L22 22" stroke="#ff5272" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 4V14" stroke="#ff5272" stroke-width="2.5" stroke-linecap="round"/><path d="M14 14L20 8" stroke="#36d9c4" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="8" r="2" fill="#36d9c4"/></svg>
      <span style="font-size:var(--text-sm);color:var(--text-muted)">Vantage</span>
    </div>
    <div class="public-footer-links">
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="https://discord.gg/vantage">Discord</a>
    </div>
  </footer>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
  <script>lucide.createIcons();</script>
</body>
</html>
